stages:
  - test
  - docs
  - deploy

variables:
  JULIA_DEPOT_PATH: "$CI_PROJECT_DIR/.julia"

cache:
  # Cache the package sources, registries and artifacts but NOT the
  # `compiled/` precompile cache: Julia patch-version changes in the
  # docker image leave behind stale .ji files that brick stdlib loads
  # (LibGit2 / Pkg / MbedTLS_jll). Letting Julia rebuild compiled/ on
  # every run keeps the cache consistent at a small precompile cost.
  paths:
    - $JULIA_DEPOT_PATH/registries
    - $JULIA_DEPOT_PATH/packages
    - $JULIA_DEPOT_PATH/artifacts
  key: "$CI_JOB_NAME-$CI_COMMIT_REF_NAME-v2"


before_script:
  - mkdir -p /root/.ssh && ssh-keyscan -H -t rsa git.km3net.de >> /root/.ssh/known_hosts

.script:
  script:
    - |
      julia -e '
        using Pkg
        Pkg.Registry.add()
        Pkg.Registry.add(RegistrySpec(url = "https://git.km3net.de/common/julia-registry"))'
      julia --project=@. -e '
        using Pkg
        Pkg.instantiate()
        Pkg.resolve()
        Pkg.build()
        Pkg.test(coverage=true)'

.coverage:
  coverage: /Test coverage (\d+\.\d+%)/
  after_script:
    - |
      julia -e '
        using Pkg
        Pkg.Registry.add()
        Pkg.Registry.add(RegistrySpec(url = "https://git.km3net.de/common/julia-registry"))
        Pkg.add("Coverage")
        using Coverage
        c, t = get_summary(process_folder())
        using Printf
        @printf "Test coverage %.2f%%\n" 100c / t'

Julia 1.10:
  image: git.km3net.de:4567/common/dockerfiles/base/julia:1.10
  stage: test
  extends:
    - .script
    - .coverage
  tags:
    - shared-cache

Julia 1.11:
  image: git.km3net.de:4567/common/dockerfiles/base/julia:1.11
  stage: test
  extends:
    - .script
    - .coverage
  tags:
    - shared-cache

Julia 1.10-multi-thread:
  image: git.km3net.de:4567/common/dockerfiles/base/julia:1.10
  stage: test
  extends:
    - .script
    - .coverage
